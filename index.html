<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="https://siesjk189.github.io/icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://siesjk189.github.io/icon.png">
    
    <meta name="apple-mobile-web-app-title" content="三分糖小手机">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --wechat-green: #07c160; --bg-color: #ededed; --border-color: #d8d8d8; --link-color: #576b95; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: auto; padding: 20px 0; }
        #phone-wrapper { position: relative; width: 390px; height: 844px; background: #111; border-radius: 55px; padding: 12px; box-shadow: 0 0 0 2px #333, 0 0 0 4px #555, 0 30px 80px rgba(0,0,0,0.8), inset 0 0 0 1px #222; flex-shrink: 0; }
        #phone-wrapper::before { content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #111; border-radius: 0 0 20px 20px; z-index: 9999; }
        #phone-shell { width: 100%; height: 100%; background: var(--bg-color); position: relative; display: flex; flex-direction: column; border-radius: 44px; overflow: hidden; }

        @media (max-width: 480px) {
            body { padding: 0; background: #000; align-items: stretch; }
            #phone-wrapper { width: 100%; height: 100dvh; border-radius: 0; padding: 0; box-shadow: none; background: transparent; }
            #phone-wrapper::before { display: none; }
            #phone-shell { border-radius: 0; height: 100dvh; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        }
        
        .nav { height: 48px; background: var(--bg-color); border-bottom: 0.5px solid var(--border-color); display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 1000; position: relative;}
        .nav-title { font-weight: bold; font-size: 16px; }
        .back-btn { position: absolute; left: 15px; cursor: pointer; color: #000; font-size: 18px; }
        .more-btn { position: absolute; right: 15px; cursor: pointer; font-weight: bold; font-size: 18px; color: #333; }
        
        .viewport { flex: 1; overflow-y: auto; position: relative; }
        .page { display: none; height: 100%; }
        .page.active { display: block; }
        
        #mo-cover { height: 210px; background: #333 center/cover; position: relative; margin-bottom: 45px; }
        .mo-user-info { position: absolute; right: 15px; bottom: -15px; display: flex; align-items: center; z-index: 10; }
        .mo-u-name { color: white; text-shadow: 1px 1px 3px #000; font-weight: bold; margin-right: 12px; }
        .mo-u-avatar { width: 68px; height: 68px; border-radius: 8px; border: 2px solid white; background: #eee; object-fit: cover; }
        
        .cell { display: flex; padding: 12px 16px; border-bottom: 0.5px solid #eee; align-items: center; cursor: pointer; background: #fff; }
        .avatar { width: 48px; height: 48px; border-radius: 6px; background: #eee; object-fit: cover; margin-right: 12px; flex-shrink: 0; }
        
        #chat-room { position: absolute; inset: 0; background: var(--bg-color) no-repeat center/cover; z-index: 2000; display: none; flex-direction: column; }
        .chat-msgs { flex: 1; padding: 15px; overflow-y: auto; }
        .msg { display: flex; margin-bottom: 16px; width: 100%; }
        .msg.user { flex-direction: row-reverse; }
        .bubble { max-width: 70%; padding: 10px 12px; font-size: 15px; margin: 0 10px; word-break: break-all; background: #fff; border-radius: 6px; border: 0.5px solid #ddd; line-height: 1.45; }
        .msg.user .bubble { background: #95ec69; border-color: #82d358; }
        .bubble img { max-width: 150px; border-radius: 4px; display: block; }

        .input-bar { padding: 10px; background: #f7f7f7; display: flex; align-items: center; border-top: 0.5px solid #ddd; gap: 8px; }
        .id-toggle { width: 34px; height: 34px; border-radius: 4px; background: #ddd center/cover; cursor: pointer; border: 1.5px solid #ccc; flex-shrink: 0; }
        #chat-in { flex: 1; border: 0.5px solid #ddd; height: 36px; border-radius: 4px; padding: 0 10px; font-size: 14px; outline: none; }

        .api-panel { margin: 15px; padding: 15px; background: #fff; border: 2px solid #ffcc00; border-radius: 8px; }
        .api-hint { font-size: 12px; color: #d4a017; font-weight: bold; margin-bottom: 10px; display: block; }
        .api-field { width: 100%; border: 1px solid #ddd; padding: 8px; border-radius: 4px; margin-bottom: 10px; font-size: 14px; }

        .tab-bar { height: 56px; background: #f7f7f7; border-top: 0.5px solid var(--border-color); display: flex; z-index: 100; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #1a1a1a; cursor: pointer; }
        .tab-item.active { color: var(--wechat-green); }
        
        .modal { position: absolute; inset: 0; background: #fff; z-index: 3000; display: none; flex-direction: column; }
        .input-group { padding: 12px 15px; border-bottom: 0.5px solid #eee; }
        .input-label { font-size: 11px; color: #888; margin-bottom: 4px; display: block; }
        .input-item { border: none; outline: none; font-size: 15px; width: 100%; padding: 4px 0; background: transparent; }
    </style>
</head>
<body>

<div id="phone-wrapper">
<div id="phone-shell">
    <div class="nav">
        <div id="nav-title" class="nav-title">信息</div>
        <div id="nav-extra"></div>
    </div>
    
    <div class="viewport">
        <div id="p-msg" class="page active"></div>
        <div id="p-contacts" class="page">
            <div class="cell" onclick="openCharEdit()"><b style="color:var(--wechat-green)">+ 添加新角色</b></div>
            <div id="contacts-list"></div>
        </div>
        <div id="p-moments" class="page">
            <div id="mo-cover">
                <div class="mo-user-info">
                    <span id="mo-name" class="mo-u-name"></span>
                    <img id="mo-avatar" class="mo-u-avatar">
                </div>
            </div>
            <div class="cell" onclick="postMoment()" style="justify-content:center; color:var(--link-color); font-weight:500;"> 手动发布动态</div>
            <div id="moments-list"></div>
        </div>
        <div id="p-me" class="page">
            <div class="cell" onclick="editMe()"><img id="me-avatar" class="avatar"><b id="me-name"></b></div>
            <div class="cell" onclick="openStickerManager()">♚表情包管理</div>
            <div class="cell" onclick="openWorldBook()">♛世界书管理</div>
            <div class="cell" onclick="editGlobalCSS()">♞全局 UI CSS </div>
            <div class="cell" onclick="toggleTimeAware()" id="time-aware-cell">♟ 时间感知：<span id="time-aware-status" style="color:#999;">关闭</span></div>
            <div class="cell" onclick="toggleNotify()" id="notify-cell">♝ 消息通知：<span id="notify-status" style="color:#999;">关闭</span></div>
            <div class="cell" onclick="exportData()" style="color:var(--wechat-green)">※ 导出/保存当前配置 </div>
            <div class="cell" onclick="importData()">※ 导入配置数据 </div>
            
            <div class="api-panel">
                <span class="api-hint">API 接口设置</span>
                <input class="api-field" id="api-url" placeholder="Endpoint: https://api..." oninput="saveAPI()">
                <input class="api-field" id="api-key" type="password" placeholder="Key: sk-..." oninput="saveAPI()">
                <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px;">
                    <select id="api-model" onchange="saveAPI()" style="flex:1; border:1px solid #ddd; padding:8px; border-radius:4px; font-size:14px; min-width:0;">
                        <option value="">— 请先拉取模型 —</option>
                    </select>
                    <button onclick="fetchModels()" id="fetch-model-btn" style="flex-shrink:0; height:36px; padding:0 12px; border:none; background:var(--wechat-green); color:#fff; border-radius:4px; font-size:13px; cursor:pointer;">拉取</button>
                </div>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="showTab('msg',this)">♡信息</div>
        <div class="tab-item" onclick="showTab('contacts',this)">♤好友</div>
        <div class="tab-item" onclick="showTab('moments',this)">♧朋友圈</div>
        <div class="tab-item" onclick="showTab('me',this)">♢我</div>
    </div>

    <div id="chat-room">
        <div class="nav">
            <div class="back-btn" onclick="goBack()">‹ 返回</div>
            <div id="chat-title" class="nav-title"></div>
            <div class="more-btn" onclick="openCharEdit(curChatId)">>></div>
        </div>
        <div class="chat-msgs" id="chat-area"></div>
        <div class="input-bar">
            <div id="sim-btn" class="id-toggle" onclick="toggleSimMode()"></div>
            <input type="text" id="chat-in" placeholder="输入消息..." onkeydown="if(event.key==='Enter') handleSend()">
            <div onclick="toggleStickerPanel()" style="font-size:24px; cursor:pointer;">☺</div>
            <button onclick="handleSend()" style="border:none; background:var(--wechat-green); color:white; padding:0 12px; border-radius:4px; height:34px;">发送</button>
        </div>
        <div id="sticker-panel" style="display:none; background:#f7f7f7; border-top:0.5px solid #ddd; grid-template-columns: repeat(4, 1fr); gap:10px; padding:10px; max-height:200px; overflow-y:auto;"></div>
    </div>

    <div id="modal-box" class="modal">
        <div class="nav">
            <div onclick="hideModal()" style="position:absolute; left:15px; cursor:pointer;">取消</div>
            <div id="modal-head" style="font-weight:bold;"></div>
            <div id="modal-ok" style="position:absolute; right:15px; color:var(--wechat-green); font-weight:bold; cursor:pointer;">完成</div>
        </div>
        <div id="modal-body" style="flex:1; overflow-y:auto;"></div>
    </div>

</div>
</div>

<style id="RUNTIME_CSS"></style>

<script>
const DB_KEY = "ST_V66_MOMENTS_AI";
let db = JSON.parse(localStorage.getItem(DB_KEY)) || {
    u: { n:'用户', a:'', p:'', bg:'', css:'' },
    c: [], m: {}, mo: [], w: [], s: [], api: { u:'', k:'', model:'' }, g_css: '', timeAware: false, notifyOn: false
};

let curChatId = null;
let isSimMode = false;
let timers = {};

function commit() { localStorage.setItem(DB_KEY, JSON.stringify(db)); applyCSS(); render(); }
function applyCSS() {
    let css = db.g_css ? db.g_css.replace(/\.bubble/g, 'html body #phone-shell .bubble') : "";
    db.c.forEach(c => { if(c.css) css += `html body #phone-shell .char-msg-${c.id} .bubble { ${c.css} }\n`; });
    if(db.u.css) css += `html body #phone-shell .msg.user .bubble { ${db.u.css} }\n`;
    document.getElementById('RUNTIME_CSS').innerHTML = css;
}

const isImg = (url) => (typeof url === 'string' && (url.match(/\.(jpeg|jpg|gif|png|webp|svg|ico)$/i) != null || url.startsWith('data:image')));

function render() {
    document.getElementById('me-name').innerText = db.u.n;
    document.getElementById('me-avatar').src = db.u.a || '';
    document.getElementById('mo-name').innerText = db.u.n;
    document.getElementById('mo-avatar').src = db.u.a || '';
    document.getElementById('mo-cover').style.backgroundImage = db.u.bg ? `url(${db.u.bg})` : 'none';
    document.getElementById('api-url').value = db.api.u || '';
    document.getElementById('api-key').value = db.api.k || '';
    
    const sel = document.getElementById('api-model');
    if(db.api.models && db.api.models.length) {
        sel.innerHTML = db.api.models.map(m => `<option value="${m}" ${m===db.api.model?'selected':''}>${m}</option>`).join('');
    }

    document.getElementById('p-msg').innerHTML = db.c.map(i => {
        const h = db.m[i.id] || [];
        const last = h.length > 0 ? h[h.length-1].c : '[暂无对话]';
        return `<div class="cell" onclick="startChat(${i.id})"><img src="${i.a}" class="avatar"><div><b>${i.n}</b><p style="font-size:12px;color:#888;">${isImg(last)?'[表情]':last.substring(0,20)}</p></div></div>`;
    }).join('');

    const taEl = document.getElementById('time-aware-status');
    if(taEl) { taEl.innerText = db.timeAware ? '开启' : '关闭'; taEl.style.color = db.timeAware ? 'var(--wechat-green)' : '#999'; }
    const notifyEl = document.getElementById('notify-status');
    if(notifyEl) { notifyEl.innerText = db.notifyOn ? '开启' : '关闭'; notifyEl.style.color = db.notifyOn ? 'var(--wechat-green)' : '#999'; }

    document.getElementById('contacts-list').innerHTML = db.c.map(i => `<div class="cell" onclick="openCharEdit(${i.id})"><img src="${i.a}" class="avatar"><div>${i.n}</div></div>`).join('');

    document.getElementById('moments-list').innerHTML = db.mo.map((m, idx) => {
        const author = (m.uid==='me') ? db.u : (db.c.find(x=>x.id==m.uid) || {n:'未知', a:''});
        const comments = (m.comments||[]).map(c => `<div style="font-size:12px;color:#333;margin-top:4px;"><b style="color:var(--link-color);">${c.n}：</b>${c.t}</div>`).join('');
        return `<div class="cell" style="align-items:flex-start;padding:15px;background:#fff;flex-direction:column;">
            <div style="display:flex;align-items:flex-start;width:100%;">
                <img src="${author.a}" class="avatar">
                <div style="flex:1;">
                    <b style="color:var(--link-color);">${author.n}</b>
                    <p style="margin-top:5px;white-space:pre-wrap;">${m.t}</p>
                    ${m.img?`<img src="${m.img}" style="max-width:200px;margin-top:8px;border-radius:4px;">`: ''}
                    <div style="display:flex;gap:12px;margin-top:10px;">
                        <span style="color:red;font-size:11px;cursor:pointer;" onclick="db.mo.splice(${idx},1);commit();">删除</span>
                    </div>
                </div>
            </div>
            ${comments ? `<div style="background:#f4f4f4;border-radius:4px;padding:8px;margin-top:8px;width:100%;">${comments}</div>` : ''}
        </div>`;
    }).join('');
}

function startChat(id) {
    curChatId = id;
    isSimMode = false;
    if(!db.m[id]) db.m[id] = [];
    const char = db.c.find(x => x.id === id);
    document.getElementById('chat-title').innerText = char.n;
    document.getElementById('chat-room').style.display = 'flex';
    document.getElementById('chat-room').style.backgroundImage = char.bg ? `url(${char.bg})` : 'none';
    renderChat();
    updateSimUI();
}

async function fetchAI(isAuto = false) {
    const tid = isAuto || curChatId;
    if(!tid) return;
    if(!db.api.u || !db.api.k) { alert("请先配置 API"); return; }
    const char = db.c.find(x=>x.id==tid);
    const history = db.m[tid] || [];
    try {
        const base = db.api.u.replace(/\/chat\/completions\/?$/, '').replace(/\/$/, '');
        const res = await fetch(`${base}/chat/completions`, {
            method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${db.api.k}`},
            body:JSON.stringify({ 
                model: db.api.model || "gpt-3.5-turbo", 
                messages:[
                    { role:"system", content:`你正在扮演${char.n}。性格设定:${char.p}\n回复要求：简短，像发微信一样分段。` }, 
                    ...history.slice(-10).map(h=>({role:h.r==='user'?'user':'assistant',content:h.c}))
                ] 
            })
        });
        const data = await res.json();
        const full = data.choices[0].message.content;
        full.split('\n').map(s=>s.trim()).filter(s=>s.length>0).forEach(p => db.m[tid].push({ r:'ai', c:p, t:Date.now() }));
        commit(); if(curChatId==tid) renderChat();
    } catch(e) { console.error(e); }
}

function handleSend() {
    const input = document.getElementById('chat-in');
    const val = input.value.trim();
    if(!val) { fetchAI(); return; }
    db.m[curChatId].push({ r: isSimMode ? 'ai' : 'user', c: val, t: Date.now() });
    input.value = ""; renderChat(); commit();
    
    // 检查自动总结
    const currentModel = db.c.find(x => x.id == curChatId);
    if (currentModel && currentModel.autoSummary) {
        const sCount = currentModel.summaryCount || 20;
        if (db.m[curChatId].length > 0 && db.m[curChatId].length % sCount === 0) {
            manualSummary(curChatId);
        }
    }
}

function renderChat() {
    const area = document.getElementById('chat-area');
    const char = db.c.find(x=>x.id==curChatId);
    area.innerHTML = (db.m[curChatId]||[]).map((msg, i) => {
        const content = isImg(msg.c) ? `<img src="${msg.c}">` : msg.c;
        return `<div class="msg ${msg.r==='user'?'user':'ai char-msg-'+char.id}"><img src="${msg.r==='user'?db.u.a:char.a}" class="avatar" style="margin:0"><div class="bubble" ondblclick="manageMsg(${i})">${content}</div></div>`;
    }).join('');
    area.scrollTop = area.scrollHeight;
}

function openCharEdit(id = null) {
    const isE = id !== null;
    const char = isE ? db.c.find(x=>x.id===id) : { n:'', a:'', p:'', bg:'', css:'', autoOn:false, minT:10, maxT:60, autoSummary:false, summaryCount:20 };
    showModal(isE?'资料设置':'添加角色', () => {
        const data = {
            id: isE ? id : Date.now(), 
            n: document.getElementById('i-n').value, 
            a: document.getElementById('i-a').value,
            p: document.getElementById('i-p').value, 
            bg: document.getElementById('i-bg').value,
            css: document.getElementById('i-css').value, 
            autoOn: document.getElementById('i-auto').checked,
            autoSummary: document.getElementById('i-autoSummary').checked,
            summaryCount: parseInt(document.getElementById('i-summaryCount').value) || 20,
            minT: parseInt(document.getElementById('i-min').value) || 10,
            maxT: parseInt(document.getElementById('i-max').value) || 60
        };
        if(isE) db.c = db.c.map(x=>x.id===id?data:x); else { db.c.push(data); db.m[data.id]=[]; }
        commit();
    }, `
        <div class="input-group"><span class="input-label">昵称</span><input id="i-n" class="input-item" value="${char.n}"></div>
        <div class="input-group"><span class="input-label">头像 URL</span><input id="i-a" class="input-item" value="${char.a}"></div>
        <div class="input-group"><span class="input-label">设定</span><textarea id="i-p" class="input-item" style="height:60px">${char.p}</textarea></div>
        <div class="input-group"><span class="input-label">背景图 URL</span><input id="i-bg" class="input-item" value="${char.bg||''}"></div>
        <div class="input-group"><span class="input-label">记忆管理</span>
            <div style="display:flex; align-items:center; gap:5px;">
                <label><input type="checkbox" id="i-autoSummary" ${char.autoSummary ? 'checked' : ''}> 每隔</label>
                <input id="i-summaryCount" type="number" style="width:50px; text-align:center;" value="${char.summaryCount || 20}"> 条自动总结
            </div>
            <button onclick="manualSummary(${id})" style="width:100%; margin-top:8px;">立即生成历史总结</button>
        </div>
        <div class="input-group"><span class="input-label">主动消息</span><label><input type="checkbox" id="i-auto" ${char.autoOn?'checked':''}> 开启</label> 分钟: <input id="i-min" type="number" style="width:40px" value="${char.minT}">-<input id="i-max" type="number" style="width:40px" value="${char.maxT}"></div>
        <div class="input-group"><span class="input-label">专属气泡 CSS</span><input id="i-css" class="input-item" value="${char.css||''}"></div>
        ${isE ? `<p onclick="deleteChar(${id})" style="color:red;text-align:center;padding:15px;cursor:pointer;">删除角色</p>` : ''}
    `);
}

async function manualSummary(id) {
    const char = db.c.find(x => x.id == id);
    const history = db.m[id] || [];
    if (history.length < 5) { alert("记录太少"); return; }
    try {
        const base = db.api.u.replace(/\/chat\/completions\/?$/, '').replace(/\/$/, '');
        const res = await fetch(`${base}/chat/completions`, {
            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${db.api.k}` },
            body: JSON.stringify({
                model: db.api.model,
                messages: [{ role: 'system', content: `总结记忆，150字内。` }, { role: 'user', content: history.slice(-50).map(h=>h.c).join('\n') }]
            })
        });
        const data = await res.json();
        char.p = (char.p ? char.p + "\n" : "") + "【记忆总结】：" + data.choices[0].message.content;
        commit(); alert("总结完成！");
    } catch (e) { alert("失败"); }
}

function showTab(t, el) {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('p-'+t).classList.add('active');
    document.querySelectorAll('.tab-item').forEach(i=>i.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('nav-title').innerText = {msg:'信息', contacts:'好友', moments:'朋友圈', me:'我'}[t];
    render();
}

function goBack() { document.getElementById('chat-room').style.display='none'; curChatId=null; render(); }
function showModal(t, ok, b) {
    document.getElementById('modal-head').innerText=t; document.getElementById('modal-body').innerHTML=b;
    document.getElementById('modal-ok').onclick=()=>{if(ok)ok(); hideModal();};
    document.getElementById('modal-box').style.display='flex';
}
function hideModal() { document.getElementById('modal-box').style.display='none'; }
function toggleSimMode() { isSimMode = !isSimMode; updateSimUI(); }
function updateSimUI() {
    const btn = document.getElementById('sim-btn');
    const input = document.getElementById('chat-in');
    const char = db.c.find(x=>x.id==curChatId);
    if(isSimMode) {
        btn.style.backgroundImage = `url(${char.a})`; btn.style.border = '2px solid orange';
        input.placeholder = `[模拟 ${char.n}]`;
    } else {
        btn.style.backgroundImage = `url(${db.u.a})`; btn.style.border = '1.5px solid #ccc';
        input.placeholder = "输入消息...";
    }
}

function saveAPI() {
    db.api.u = document.getElementById('api-url').value;
    db.api.k = document.getElementById('api-key').value;
    commit();
}

commit();
</script>
</body>
</html>
