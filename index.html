<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="https://siesjk189.github.io/icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://siesjk189.github.io/icon.png">
    
    <meta name="apple-mobile-web-app-title" content="三分糖小手机">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --wechat-green: #07c160; --bg-color: #ededed; --border-color: #d8d8d8; --link-color: #576b95; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: auto; padding: 20px 0; }
        #phone-wrapper { position: relative; width: 390px; height: 844px; background: #111; border-radius: 55px; padding: 12px; box-shadow: 0 0 0 2px #333, 0 0 0 4px #555, 0 30px 80px rgba(0,0,0,0.8), inset 0 0 0 1px #222; flex-shrink: 0; }
        #phone-wrapper::before { content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #111; border-radius: 0 0 20px 20px; z-index: 9999; }
        #phone-shell { width: 100%; height: 100%; background: var(--bg-color); position: relative; display: flex; flex-direction: column; border-radius: 44px; overflow: hidden; }

        @media (max-width: 480px) {
            body { padding: 0; background: #000; align-items: stretch; }
            #phone-wrapper { width: 100%; height: 100dvh; border-radius: 0; padding: 0; box-shadow: none; background: transparent; }
            #phone-wrapper::before { display: none; }
            #phone-shell { border-radius: 0; height: 100dvh; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        }
        
        .nav { height: 48px; background: var(--bg-color); border-bottom: 0.5px solid var(--border-color); display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 1000; position: relative;}
        .nav-title { font-weight: bold; font-size: 16px; }
        .back-btn { position: absolute; left: 15px; cursor: pointer; color: #000; font-size: 18px; }
        .more-btn { position: absolute; right: 15px; cursor: pointer; font-weight: bold; font-size: 18px; color: #333; }
        .nav-action { position: absolute; right: 15px; color: var(--link-color); cursor: pointer; font-size: 14px; font-weight: 500; }
        
        .viewport { flex: 1; overflow-y: auto; position: relative; }
        .page { display: none; height: 100%; }
        .page.active { display: block; }
        
        #mo-cover { height: 210px; background: #333 center/cover; position: relative; margin-bottom: 45px; }
        .mo-user-info { position: absolute; right: 15px; bottom: -15px; display: flex; align-items: center; z-index: 10; }
        .mo-u-name { color: white; text-shadow: 1px 1px 3px #000; font-weight: bold; margin-right: 12px; }
        .mo-u-avatar { width: 68px; height: 68px; border-radius: 8px; border: 2px solid white; background: #eee; object-fit: cover; }
        
        .cell { display: flex; padding: 12px 16px; border-bottom: 0.5px solid #eee; align-items: center; cursor: pointer; background: #fff; }
        .avatar { width: 48px; height: 48px; border-radius: 6px; background: #eee; object-fit: cover; margin-right: 12px; flex-shrink: 0; }
        
        #chat-room { position: absolute; inset: 0; background: var(--bg-color) no-repeat center/cover; z-index: 2000; display: none; flex-direction: column; }
        .chat-msgs { flex: 1; padding: 15px; overflow-y: auto; }
        .msg { display: flex; margin-bottom: 16px; width: 100%; }
        .msg.user { flex-direction: row-reverse; }
        .bubble { max-width: 70%; padding: 10px 12px; font-size: 15px; margin: 0 10px; word-break: break-all; background: #fff; border-radius: 6px; border: 0.5px solid #ddd; line-height: 1.45; }
        .msg.user .bubble { background: #95ec69; border-color: #82d358; }
        .bubble img { max-width: 150px; border-radius: 4px; display: block; }

        .input-bar { padding: 10px; background: #f7f7f7; display: flex; align-items: center; border-top: 0.5px solid #ddd; gap: 8px; }
        .id-toggle { width: 34px; height: 34px; border-radius: 4px; background: #ddd center/cover; cursor: pointer; border: 1.5px solid #ccc; flex-shrink: 0; }
        #chat-in { flex: 1; border: 0.5px solid #ddd; height: 36px; border-radius: 4px; padding: 0 10px; font-size: 14px; outline: none; }

        .api-panel { margin: 15px; padding: 15px; background: #fff; border: 2px solid #ffcc00; border-radius: 8px; }
        .api-hint { font-size: 12px; color: #d4a017; font-weight: bold; margin-bottom: 10px; display: block; }
        .api-field { width: 100%; border: 1px solid #ddd; padding: 8px; border-radius: 4px; margin-bottom: 10px; font-size: 14px; }

        .tab-bar { height: 56px; background: #f7f7f7; border-top: 0.5px solid var(--border-color); display: flex; z-index: 100; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #1a1a1a; cursor: pointer; }
        .tab-item.active { color: var(--wechat-green); }
        
        .modal { position: absolute; inset: 0; background: #fff; z-index: 3000; display: none; flex-direction: column; }
        .input-group { padding: 12px 15px; border-bottom: 0.5px solid #eee; }
        .input-label { font-size: 11px; color: #888; margin-bottom: 4px; display: block; }
        .input-item { border: none; outline: none; font-size: 15px; width: 100%; padding: 4px 0; background: transparent; }
    </style>
</head>
<body>

<div id="phone-wrapper">
<div id="phone-shell">
    <div class="nav">
        <div id="nav-title" class="nav-title">信息</div>
        <div id="nav-extra"></div>
    </div>
    
    <div class="viewport">
        <div id="p-msg" class="page active"></div>
        <div id="p-contacts" class="page">
            <div class="cell" onclick="openCharEdit()"><b style="color:var(--wechat-green)">+ 添加新角色</b></div>
            <div id="contacts-list"></div>
        </div>
        <div id="p-moments" class="page">
            <div id="mo-cover">
                <div class="mo-user-info">
                    <span id="mo-name" class="mo-u-name"></span>
                    <img id="mo-avatar" class="mo-u-avatar">
                </div>
            </div>
            <div class="cell" onclick="postMoment()" style="justify-content:center; color:var(--link-color); font-weight:500;"> 手动发布动态</div>
            <div id="moments-list"></div>
        </div>
        <div id="p-me" class="page">
            <div class="cell" onclick="editMe()"><img id="me-avatar" class="avatar"><b id="me-name"></b></div>
            <div class="cell" onclick="openStickerManager()">♚表情包管理</div>
            <div class="cell" onclick="openWorldBook()">♛世界书管理</div>
            <div class="cell" onclick="editGlobalCSS()">♞全局 UI CSS </div>
            <div class="cell" onclick="toggleTimeAware()" id="time-aware-cell">♟ 时间感知：<span id="time-aware-status" style="color:#999;">关闭</span></div>
            <div class="cell" onclick="toggleInnerState()" id="inner-state-cell">♜ 心声自动生成：<span id="inner-state-status" style="color:#999;">关闭</span></div>
            <div class="cell" onclick="toggleNotify()" id="notify-cell">♝ 消息通知：<span id="notify-status" style="color:#999;">关闭</span></div>
            <div class="cell" onclick="exportData()" style="color:var(--wechat-green)">※ 导出/保存当前配置 </div>
            <div class="cell" onclick="importData()">※ 导入配置数据 </div>
            
            <div class="api-panel">
                <span class="api-hint">API 接口设置</span>
                <input class="api-field" id="api-url" placeholder="Endpoint: https://api..." oninput="saveAPI()">
                <input class="api-field" id="api-key" type="password" placeholder="Key: sk-..." oninput="saveAPI()">
                <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px;">
                    <select id="api-model" onchange="saveAPI()" style="flex:1; border:1px solid #ddd; padding:8px; border-radius:4px; font-size:14px; min-width:0;">
                        <option value="">— 请先拉取模型 —</option>
                    </select>
                    <button onclick="fetchModels()" id="fetch-model-btn" style="flex-shrink:0; height:36px; padding:0 12px; border:none; background:var(--wechat-green); color:#fff; border-radius:4px; font-size:13px; cursor:pointer;">拉取</button>
                </div>
                <div id="fetch-model-tip" style="font-size:11px; color:#888; margin-top:4px;"></div>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="showTab('msg',this)">♡信息</div>
        <div class="tab-item" onclick="showTab('contacts',this)">♤好友</div>
        <div class="tab-item" onclick="showTab('moments',this)">♧朋友圈</div>
        <div class="tab-item" onclick="showTab('me',this)">♢我</div>
    </div>

    <div id="chat-room">
        <div class="nav">
            <div class="back-btn" onclick="goBack()">‹ 返回</div>
            <div id="chat-title" class="nav-title"></div>
            <div class="more-btn" onclick="openCharEdit(curChatId)">>></div>
        </div>
        <div class="chat-msgs" id="chat-area"></div>
        <div class="input-bar">
            <div id="sim-btn" class="id-toggle" onclick="toggleSimMode()"></div>
            <input type="text" id="chat-in" placeholder="输入消息..." onkeydown="if(event.key==='Enter') handleSend()">
            <div onclick="toggleStickerPanel()" style="font-size:24px; cursor:pointer;">☺</div>
            <button onclick="handleSend()" style="border:none; background:var(--wechat-green); color:white; padding:0 12px; border-radius:4px; height:34px;">发送</button>
        </div>
        <div id="sticker-panel" style="display:none; background:#f7f7f7; border-top:0.5px solid #ddd; grid-template-columns: repeat(4, 1fr); gap:10px; padding:10px; max-height:200px; overflow-y:auto;"></div>
    </div>

    <div id="modal-box" class="modal">
        <div class="nav">
            <div onclick="hideModal()" style="position:absolute; left:15px; cursor:pointer;">取消</div>
            <div id="modal-head" style="font-weight:bold;"></div>
            <div id="modal-ok" style="position:absolute; right:15px; color:var(--wechat-green); font-weight:bold; cursor:pointer;">完成</div>
        </div>
        <div id="modal-body" style="flex:1; overflow-y:auto;"></div>
    </div>

</div>
</div>

<style id="RUNTIME_CSS"></style>

<script>
const DB_KEY = "ST_V66_MOMENTS_AI";
let db = JSON.parse(localStorage.getItem(DB_KEY)) || {
    u: { n:'用户', a:'', p:'', bg:'', css:'' },
    c: [], m: {}, mo: [], w: [], s: [], api: { u:'', k:'', model:'' }, g_css: '', timeAware: false, notifyOn: false, innerStateOn: false,
    apiCallCount: {}  // 记录每个角色的 API 调用次数，用于自动总结触发
};

let curChatId = null;
let isSimMode = false;
let timers = {};

function commit() { localStorage.setItem(DB_KEY, JSON.stringify(db)); applyCSS(); render(); }
function applyCSS() {
    let css = db.g_css ? db.g_css.replace(/\.bubble/g, 'html body #phone-shell .bubble') : "";
    db.c.forEach(c => { if(c.css) css += `html body #phone-shell .char-msg-${c.id} .bubble { ${c.css} }\n`; });
    if(db.u.css) css += `html body #phone-shell .msg.user .bubble { ${db.u.css} }\n`;
    document.getElementById('RUNTIME_CSS').innerHTML = css;
}

if(window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
        const shell = document.getElementById('phone-shell');
        shell.style.height = window.visualViewport.height + 'px';
        const area = document.getElementById('chat-area');
        if(area) area.scrollTop = area.scrollHeight;
    });
}

const isImg = (url) => (typeof url === 'string' && (url.match(/\.(jpeg|jpg|gif|png|webp|svg|ico)$/i) != null || url.startsWith('data:image')));

function render() {
    document.getElementById('me-name').innerText = db.u.n;
    document.getElementById('me-avatar').src = db.u.a || '';
    document.getElementById('mo-name').innerText = db.u.n;
    document.getElementById('mo-avatar').src = db.u.a || '';
    document.getElementById('mo-cover').style.backgroundImage = db.u.bg ? `url(${db.u.bg})` : 'none';
    document.getElementById('api-url').value = db.api.u || '';
    document.getElementById('api-key').value = db.api.k || '';
    
    const sel = document.getElementById('api-model');
    if(db.api.models && db.api.models.length) {
        sel.innerHTML = db.api.models.map(m => `<option value="${m}" ${m===db.api.model?'selected':''}>${m}</option>`).join('');
    }

    document.getElementById('p-msg').innerHTML = db.c.map(i => {
        const h = db.m[i.id] || [];
        const last = h.length > 0 ? h[h.length-1].c : '[暂无对话]';
        return `<div class="cell" onclick="startChat(${i.id})"><img src="${i.a}" class="avatar"><div><b>${i.n}</b><p style="font-size:12px;color:#888;">${isImg(last)?'[表情]':last.substring(0,20)}</p></div></div>`;
    }).join('');

    const taEl = document.getElementById('time-aware-status');
    if(taEl) { taEl.innerText = db.timeAware ? '开启' : '关闭'; taEl.style.color = db.timeAware ? 'var(--wechat-green)' : '#999'; }
    const isEl = document.getElementById('inner-state-status');
    if(isEl) { isEl.innerText = db.innerStateOn ? '开启' : '关闭'; isEl.style.color = db.innerStateOn ? 'var(--wechat-green)' : '#999'; }
    const notifyEl = document.getElementById('notify-status');
    if(notifyEl) { notifyEl.innerText = db.notifyOn ? '开启' : '关闭'; notifyEl.style.color = db.notifyOn ? 'var(--wechat-green)' : '#999'; }

    document.getElementById('contacts-list').innerHTML = db.c.map(i => `<div class="cell" onclick="openCharEdit(${i.id})"><img src="${i.a}" class="avatar"><div>${i.n}</div></div>`).join('');

    document.getElementById('moments-list').innerHTML = db.mo.map((m, idx) => {
        const author = (m.uid==='me') ? db.u : (db.c.find(x=>x.id==m.uid) || {n:'未知', a:''});
        const comments = (m.comments||[]).map(c => `<div style="font-size:12px;color:#333;margin-top:4px;"><b style="color:var(--link-color);">${c.n}：</b>${c.t}</div>`).join('');
        return `<div class="cell" style="align-items:flex-start;padding:15px;background:#fff;flex-direction:column;">
            <div style="display:flex;align-items:flex-start;width:100%;">
                <img src="${author.a}" class="avatar">
                <div style="flex:1;">
                    <b style="color:var(--link-color);">${author.n}</b>
                    <p style="margin-top:5px;white-space:pre-wrap;">${m.t}</p>
                    ${m.img?`<img src="${m.img}" style="max-width:200px;margin-top:8px;border-radius:4px;">`: ''}
                    <div style="display:flex;gap:12px;margin-top:10px;">
                        <span style="color:red;font-size:11px;cursor:pointer;" onclick="db.mo.splice(${idx},1);commit();">删除</span>
                        <span style="color:var(--link-color);font-size:11px;cursor:pointer;" onclick="aiCommentMoment(${idx})">💬 AI回复</span>
                    </div>
                </div>
            </div>
            ${comments ? `<div style="background:#f4f4f4;border-radius:4px;padding:8px;margin-top:8px;width:100%;">${comments}</div>` : ''}
        </div>`;
    }).join('');
}

// --- 核心：AI 随机生成多角色朋友圈 ---
async function generateAIMoments() {
    if(!db.api.u || !db.api.k) { alert("请先在'我'界面配置 API 接口和密钥"); return; }
    if(db.c.length === 0) { alert("请先添加至少一个角色"); return; }

    const extra = document.getElementById('nav-extra');
    const originalContent = extra.innerHTML;
    extra.innerHTML = `<span style="font-size:12px;color:#999;">生成中...</span>`;

    // 随机决定生成几条 (1-3)
    const count = Math.min(db.c.length, Math.floor(Math.random() * 3) + 1);
    // 随机选取不重复的角色
    const shuffled = [...db.c].sort(() => 0.5 - Math.random());
    const selectedChars = shuffled.slice(0, count);

    for (const char of selectedChars) {
        const history = db.m[char.id] || [];
        const lastChat = history.slice(-10).map(h => `${h.r==='user'?'用户':'角色'}:${h.c}`).join('\n');
        
        try {
          // 合并连续AI消息，取最近30条作为上下文
        const historyMsgs = [];
        for(const h of history.slice(-30)) {
            const role = h.r === 'user' ? 'user' : 'assistant';
            if(historyMsgs.length > 0 && historyMsgs[historyMsgs.length-1].role === role) {
                historyMsgs[historyMsgs.length-1].content += '\n' + h.c;
            } else {
                historyMsgs.push({ role, content: h.c });
            }
        }

        const base = db.api.u.replace(/\/chat\/completions\/?$/, '').replace(/\/$/, '');
            const res = await fetch(`${base}/chat/completions`, {
                method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${db.api.k}`},
                body:JSON.stringify({ 
                    model: db.api.model || "gpt-3.5-turbo", 
                    messages:[
                        {
                            role:"system",
                            content: `你正在扮演角色 ${char.n}。你的性格设定是：${char.p}。\n请为该角色写一条微信朋友圈动态。
                            要求：
                            1. 必须符合人设。
                            2. 语气要像真实生活动态（分享心情、吐槽、美景等）。
                            3. 如果提供了聊天记录，请尝试结合最近聊天的内容（比如聊到了某个话题或约定）。
                            4. 如果你觉得适合配图，请在文末另起一行加上 [图片描述: xxx]。
                            5. 输出格式：直接输出动态正文，不要包含角色名字。`
                        },
                        { role:"user", content: lastChat ? `最近聊天背景：\n${lastChat}` : "暂无最近聊天，请根据人设自由发挥。" }
                    ] 
                })
            });
            const data = await res.json();
            let text = data.choices[0].message.content.trim();
            
            // 提取图片描述并尝试生成随机图（这里暂用占位图演示）
            let img = "";
            const imgMatch = text.match(/\[图片描述:?\s*(.*?)\]/);
            if(imgMatch) {
                text = text.replace(imgMatch[0], '').trim();
                // 使用关键词生成一个随机风景/生活图
                img = `https://source.unsplash.com/featured/800x600?${encodeURIComponent(imgMatch[1] || 'life')}`;
            }

            db.mo.unshift({
                uid: char.id,
                t: text,
                img: img,
                comments: []
            });
        } catch(e) {
            console.error("生成朋友圈失败", e);
        }
    }
    
    extra.innerHTML = originalContent;
    commit();
}

function startChat(id) {
    curChatId = id;
    isSimMode = false;
    if(!db.m[id]) db.m[id] = [];
    const char = db.c.find(x => x.id === id);
    document.getElementById('chat-title').innerText = char.n;
    const chatRoom = document.getElementById('chat-room');
    chatRoom.style.display = 'flex';
    chatRoom.style.backgroundImage = char.bg ? `url(${char.bg})` : 'none';
    renderChat();
    updateSimUI();
}

function showTyping(char) {
    const area = document.getElementById('chat-area');
    if(!area) return;
    removeTyping();
    const div = document.createElement('div');
    div.className = 'msg ai'; div.id = 'typing-indicator';
    div.innerHTML = `<img src="${char.a}" class="avatar" style="margin:0"><div class="bubble" style="color:#999; font-style:italic;">对方输入中…</div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
}
function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if(el) el.remove();
}

async function fetchAI(isAuto = false) {
    const tid = isAuto || curChatId;
    if(!tid) return;
    if(!db.api.u || !db.api.k) { alert("请先在'我'界面配置 API 接口和密钥"); return; }
    const char = db.c.find(x=>x.id==tid);
    const history = db.m[tid] || [];
    const last = history.length > 0 ? history[history.length-1].c : "";
    const activeWI = db.w.filter(i => (i.bind==='all' || i.bind==tid) && (i.isAlways || (i.k && last.includes(i.k)))).map(i=>i.v).join('\n');

    // 生成时间上下文（内联实现，避免函数未定义报错）
    let timeCtx = "";
    if(db.timeAware) {
        try {
            const now = new Date();
            const days = ["周日","周一","周二","周三","周四","周五","周六"];
            timeCtx = `【当前时间】${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${days[now.getDay()]} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        } catch(e) { timeCtx = ""; }
    }

    // 合并连续AI消息，取最近30条作为上下文
    const historyMsgs = [];
    for(const h of history.slice(-30)) {
        const role = h.r === 'user' ? 'user' : 'assistant';
        if(historyMsgs.length > 0 && historyMsgs[historyMsgs.length-1].role === role) {
            historyMsgs[historyMsgs.length-1].content += '\n' + h.c;
        } else {
            historyMsgs.push({ role, content: h.c });
        }
    }

    let parts = [];
    try {
        if(curChatId == tid) showTyping(char);
        const base = db.api.u.replace(/\/chat\/completions\/?$/, '').replace(/\/$/, '');
        // 去掉模型名里可能含有的前缀标签，如 [按次]、[免费] 等
        const modelName = db.api.model || "gpt-3.5-turbo";
        const res = await fetch(`${base}/chat/completions`, {
            method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${db.api.k}`},
            body:JSON.stringify({ 
                model: modelName,
                messages:[
                    {
                        role:"system",
                        content:`你正在扮演${char.n}，通过手机微信和用户聊天。
性格设定:${char.p}
${char.memory ? '【角色记忆】:\n' + char.memory + '\n' : ''}${char.innerState ? '【当前状态/心声】（仅供参考，绝对不要在消息中描述动作或心声）:\n' + char.innerState + '\n' : ''}${timeCtx ? timeCtx + '\n【时间要求】请根据当前时间自然聊天，不要提出与时间不符的事情（如下午4点不要问吃饭了吗）。\n' : ''}${activeWI ? '规则:' + activeWI + '\n' : ''}
【绝对禁止】不能用括号()【】*等符号描述动作、神态、心情，只能发纯文字消息，就像真实发微信一样。
【记忆要求】仔细阅读上方记忆区和完整聊天记录，不要重复询问用户已经说过的事情，不要忘记之前聊过的内容。
${db.innerStateOn ? `【回复格式】必须严格按以下格式输出，不能有任何多余内容：
MESSAGES:
（每条消息单独一行，1~3条，每条不超过25个字）
INNERSTATE:
（用第一人称写此刻内心状态，30字以内）` : `【回复格式】每次拆成1~3条简短消息，每条不超过25个字，每条单独一行。`}`
                    }, 
                    ...historyMsgs
                ] 
            })
        });

        let data;
        try {
            data = await res.json();
        } catch(jsonErr) {
            throw new Error("API 返回格式错误，请确认接口地址正确且未开启 stream 模式");
        }

        // 调试：显示实际模型名和返回内容
        if(!data.choices || !data.choices[0] || !data.choices[0].message) {
            const errMsg = data.error?.message || JSON.stringify(data);
            throw new Error(`模型: ${modelName}\nAPI错误: ${errMsg}`);
        }

        const full = data.choices[0].message.content;
        if(db.innerStateOn && full.includes('MESSAGES:') && full.includes('INNERSTATE:')) {
            const msgSection = full.split('INNERSTATE:')[0].replace('MESSAGES:', '').trim();
            const stateSection = full.split('INNERSTATE:')[1].trim();
            parts = msgSection.split('\n').map(s=>s.trim()).filter(s=>s.length>0);
            // 更新心声到角色数据
            if(stateSection) {
                const charObj = db.c.find(x=>x.id==tid);
                if(charObj) { charObj.innerState = stateSection; commit(); }
            }
        } else {
            parts = full.split('\n').map(s=>s.trim()).filter(s=>s.length>0);
        }

    } catch(e) {
        removeTyping();
        console.error(e);
        alert("AI 回复失败：" + e.message);
        return;
    }

    // 逐条发送消息，每条之间加延迟，模拟真实打字节奏
    for(let i = 0; i < parts.length; i++) {
        if(i === 0) removeTyping();
        else {
            // 中间条：先显示输入中，再过渡到消息
            if(curChatId == tid) showTyping(char);
            await new Promise(r => setTimeout(r, 800 + Math.random() * 700));
            if(curChatId == tid) removeTyping();
        }

        db.m[tid].push({ r:'ai', c:parts[i], t:Date.now() });
        commit();
        if(curChatId == tid) renderChat();

        // 如果不是最后一条，等一下再发下一条
        if(i < parts.length - 1) {
            await new Promise(r => setTimeout(r, 400 + Math.random() * 400));
        }
    }

    if (db.notifyOn && "Notification" in window && Notification.permission === "granted") {
        // 切到后台时发通知
        if (document.hidden) {
            let notifyText = parts[parts.length - 1] || parts.join(' ');
            if(notifyText.includes('http')) notifyText = '[图片消息]';
            try {
                new Notification(char.n, { body: notifyText, icon: char.a || '' });
            } catch(e) { console.log('通知失败', e); }
        }
    }

    // 记录 API 调用次数
    if(!db.apiCallCount) db.apiCallCount = {};
    db.apiCallCount[tid] = (db.apiCallCount[tid] || 0) + 1;

    if(isAuto) resetTimer(tid);

    // 检查自动总结（按 API 调用次数）
    const charForSummary = db.c.find(x => x.id == tid);
    if (charForSummary && charForSummary.autoSummary) {
        const sCount = parseInt(charForSummary.summaryCount) || 20;
        if (db.apiCallCount[tid] % sCount === 0) {
            autoSummary(tid);
        }
    }
}

// 自动触发的总结（无 event，静默追加到记忆区）
async function autoSummary(tid) {
    const char = db.c.find(x => x.id == tid);
    if (!char) return;
    const history = db.m[tid] || [];
    if (history.length < 5) return;

    const minLen = parseInt(char.summaryMinLen) || 100;
    const maxLen = parseInt(char.summaryMaxLen) || 300;
    const chatText = history.slice(-60).map(h => `${h.r === 'user' ? '用户' : char.n}:${h.c}`).join('\n');

    try {
        const base = db.api.u.replace(/\/chat\/completions\/?$/, '').replace(/\/$/, '');
        const res = await fetch(`${base}/chat/completions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${db.api.k}` },
            body: JSON.stringify({
                model: db.api.model,
                messages: [
                    {
                        role: 'system',
                        content: `你是一个记忆提取助手。请根据提供的对话，为角色 ${char.n} 写一段记忆总结。必须使用第三人称，字数在${minLen}到${maxLen}字之间。重点记录关键事件、情感变化和重要细节。只输出总结内容，不要加任何前缀说明。`
                    },
                    { role: 'user', content: `对话历史：\n${chatText}` }
                ]
            })
        });
        const data = await res.json();
        const summary = data.choices[0].message.content.trim();
        const timestamp = new Date().toLocaleString('zh-CN', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
        char.memory = (char.memory ? char.memory + '\n\n' : '') + `【${timestamp} 自动总结】\n${summary}`;
        commit();
    } catch(e) {
        console.error('自动总结失败', e);
    }
}

    const author = moment.uid === 'me' ? db.u.n : (db.c.find(x=>x.id==moment.uid)||{n:'TA'}).n;
    try {
        const base = db.api.u.replace(/\/chat\/completions\/?$/, '').replace(/\/$/, '');
        const res = await fetch(`${base}/chat/completions`, {
            method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${db.api.k}`},
            body: JSON.stringify({ model: db.api.model, messages:[
                {role:'system', content:`你是${char.n}，性格:${char.p}。你在朋友圈看到${author}发了一条动态，请写一句简短评论，不超过20字。`},
                {role:'user', content: moment.t || '[图片]'}
            ]})
        });
        const data = await res.json();
        const comment = data.choices[0].message.content.trim();
        if(!moment.comments) moment.comments = [];
        moment.comments.push({ n: char.n, t: comment });
        commit();
    } catch(e) { alert(e.message); }
}

function openStickerManager() {
    showModal('表情包管理', commit, `<button onclick="addSticker()" style="width:100%;padding:10px;">+ 添加 URL 表情</button><div id="s-list"></div>`);
    renderSList();
}
function addSticker() {
    const url = prompt("表情 URL :"); const desc = prompt("描述 :");
    if(url) { db.s.push({url, desc}); renderSList(); }
}
function renderSList() {
    document.getElementById('s-list').innerHTML = db.s.map((it, i) => `
        <div class="cell" style="justify-content:space-between">
            <img src="${it.url}" style="width:40px;height:40px;object-fit:contain;">
            <span>${it.desc}</span><span style="color:red" onclick="db.s.splice(${i},1);renderSList();">删除</span>
        </div>
    `).join('');
}
function toggleStickerPanel() {
    const p = document.getElementById('sticker-panel');
    p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
    p.innerHTML = db.s.map(it => `<img src="${it.url}" style="width:100%;aspect-ratio:1;object-fit:contain;cursor:pointer;" onclick="sendSticker('${it.url}')">`).join('');
}
function sendSticker(url) {
    db.m[curChatId].push({ r: isSimMode?'ai':'user', c: url, t: Date.now() });
    toggleStickerPanel(); commit(); renderChat();
}

function exportData() {
    const s = btoa(unescape(encodeURIComponent(JSON.stringify(db))));
    showModal('导出', null, `<textarea class="input-item" style="height:300px;">${s}</textarea>`);
}
function importData() {
    showModal('导入', () => { try { db=JSON.parse(decodeURIComponent(escape(atob(document.getElementById('imp').value)))); commit(); } catch(e){alert('无效代码');} }, `<textarea id="imp" class="input-item" style="height:300px;"></textarea>`);
}

function toggleTimeAware() { db.timeAware = !db.timeAware; commit(); }
function toggleInnerState() { db.innerStateOn = !db.innerStateOn; commit(); }
async function toggleNotify() {
    if (!db.notifyOn) {
        if (!("Notification" in window)) { alert("此浏览器不支持通知"); return; }
        if (Notification.permission === "denied") { alert("通知权限已被拒绝，请在浏览器设置里手动开启"); return; }
        const perm = await Notification.requestPermission();
        if (perm !== "granted") { alert("未获得通知权限，无法开启"); return; }
        db.notifyOn = true;
        alert("通知已开启！切到后台后AI回复会推送通知。");
    } else {
        db.notifyOn = false;
    }
    commit();
}

function showTab(t, el) {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('p-'+t).classList.add('active');
    document.querySelectorAll('.tab-item').forEach(i=>i.classList.remove('active'));
    el.classList.add('active');
    
    const navTitle = document.getElementById('nav-title');
    const navExtra = document.getElementById('nav-extra');
    navTitle.innerText = {msg:'信息', contacts:'好友', moments:'朋友圈', me:'我'}[t];
    
    // 朋友圈界面显示 AI 生成按钮
    if(t === 'moments') {
        navExtra.innerHTML = `<div class="nav-action" onclick="generateAIMoments()">✨ 自动生成</div>`;
    } else {
        navExtra.innerHTML = '';
    }
    render();
}

function goBack() { document.getElementById('chat-room').style.display='none'; curChatId=null; render(); }
function showModal(t, ok, b) {
    document.getElementById('modal-head').innerText=t; document.getElementById('modal-body').innerHTML=b;
    document.getElementById('modal-ok').onclick=()=>{if(ok)ok(); hideModal();};
    document.getElementById('modal-box').style.display='flex';
}
function hideModal() { document.getElementById('modal-box').style.display='none'; }
function manageMsg(i) {
    showModal('编辑消息', () => { db.m[curChatId][i].c=document.getElementById('e-m').value; commit(); renderChat(); }, `<textarea id="e-m" class="input-item" style="height:150px">${db.m[curChatId][i].c}</textarea><p onclick="db.m[curChatId].splice(${i},1);hideModal();commit();renderChat();" style="color:red;padding:10px;text-align:center;cursor:pointer;">删除</p>`);
}
function resetTimer(cid) { if(timers[cid]) clearTimeout(timers[cid]); const c=db.c.find(x=>x.id==cid); if(!c||!c.autoOn)return; const ms=(Math.floor(Math.random()*(c.maxT-c.minT+1))+c.minT)*60000; timers[cid]=setTimeout(()=>fetchAI(cid), ms); }

async function fetchModels() {
    const url = document.getElementById('api-url').value;
    const key = document.getElementById('api-key').value;
    const btn = document.getElementById('fetch-model-btn');
    btn.innerText = '...';
    try {
        const base = url.replace(/\/chat\/completions\/?$/, '').replace(/\/$/, '');
        const res = await fetch(`${base}/models`, { headers: { 'Authorization': `Bearer ${key}` } });
        const data = await res.json();
        const models = (data.data || []).map(m => m.id);
        const sel = document.getElementById('api-model');
        sel.innerHTML = models.map(m => `<option value="${m}">${m}</option>`).join('');
        db.api.models = models;
        if(models.length) db.api.model = models[0];
        commit();
    } catch(e) { alert('拉取失败'); } finally { btn.innerText = '拉取'; }
}

function saveAPI() {
    db.api.u = document.getElementById('api-url').value;
    db.api.k = document.getElementById('api-key').value;
    db.api.model = document.getElementById('api-model').value;
    commit();
}
function editGlobalCSS() { showModal('全局 CSS', () => { db.g_css=document.getElementById('g-v').value; commit(); }, `<textarea id="g-v" class="input-item" style="height:300px;">${db.g_css}</textarea>`); }

commit();
db.c.forEach(c => { if(c.autoOn) resetTimer(c.id); });
</script>
</body>
</html>
